<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Abfall DD">
  <title>Dresdner Abfall</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#007AFF">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #007AFF;
      --green:   #34C759;
      --gray:    #8E8E93;
      --orange:  #FF9500;
      --red:     #FF3B30;
      --bg:      #F2F2F7;
      --surface: #FFFFFF;
      --border:  rgba(60,60,67,0.18);
      --label:   #000000;
      --label3:  rgba(60,60,67,0.55);
      --tabbar:  rgba(249,249,249,0.94);
      --safe-t:  env(safe-area-inset-top, 0px);
      --safe-b:  env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1C1C1E;
        --surface: #2C2C2E;
        --border:  rgba(84,84,88,0.65);
        --label:   #FFFFFF;
        --label3:  rgba(235,235,245,0.55);
        --tabbar:  rgba(29,29,31,0.94);
      }
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-text-size-adjust: 100%; }

    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    .tab-view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .tab-view.active { display: flex; }

    .nav-bar {
      background: var(--tabbar);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 0.5px solid var(--border);
      padding: calc(var(--safe-t) + 8px) 16px 12px;
      flex-shrink: 0;
    }
    .nav-bar-row { display: flex; align-items: center; justify-content: space-between; min-height: 32px; }
    .nav-title-large { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
    .nav-title-inline { font-size: 17px; font-weight: 600; }

    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }

    .section { margin: 20px 16px 0; }
    .section-label { font-size: 13px; color: var(--label3); text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 7px; padding-left: 16px; }
    .card { background: var(--surface); border-radius: 12px; overflow: hidden; }

    .entry-row { display: flex; align-items: center; padding: 11px 16px; gap: 14px;
      border-bottom: 0.5px solid var(--border); }
    .entry-row:last-child { border-bottom: none; }
    .waste-icon { width: 46px; height: 46px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 21px; flex-shrink: 0; }
    .entry-info { flex: 1; min-width: 0; }
    .entry-name { font-size: 16px; font-weight: 600; }
    .entry-date { font-size: 14px; color: var(--label3); margin-top: 2px; }
    .entry-date.urgent { color: var(--orange); font-weight: 500; }

    .addr-row { display: flex; align-items: center; padding: 12px 16px; gap: 12px;
      border-bottom: 0.5px solid var(--border); cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    .addr-row:last-child { border-bottom: none; }
    .addr-info { flex: 1; min-width: 0; }
    .addr-name { font-size: 16px; font-weight: 600; color: var(--label); }
    .addr-sub  { font-size: 13px; color: var(--label3); margin-top: 2px; }
    .addr-check { color: var(--blue); font-size: 20px; flex-shrink: 0; }
    .addr-delete { background: none; border: none; color: var(--red); font-size: 18px;
      padding: 4px 6px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }

    .form-step { display: none; }
    .form-step.active { display: block; }

    .form-section { position: relative; margin: 18px 16px 0; }
    .form-label { font-size: 13px; color: var(--label3); text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 7px; padding-left: 16px; }
    .form-card { background: var(--surface); border-radius: 12px; overflow: hidden; }
    .form-row { display: flex; align-items: center; padding: 0 16px;
      border-bottom: 0.5px solid var(--border); min-height: 44px; gap: 8px; }
    .form-row:last-child { border-bottom: none; }
    .form-row input, .form-row select {
      flex: 1; background: none; border: none; outline: none;
      font-size: 16px; color: var(--label); padding: 12px 0;
      -webkit-appearance: none; width: 100%; }
    .form-row input::placeholder { color: var(--label3); }

    .dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      z-index: 100; background: var(--surface); border-radius: 12px;
      border: 0.5px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      max-height: 240px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .dropdown-item { padding: 13px 16px; border-bottom: 0.5px solid var(--border);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      min-height: 44px; display: flex; align-items: center; font-size: 16px; }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:active { background: rgba(0,122,255,0.08); }

    .btn-text { background: none; border: none; color: var(--blue); font-size: 17px;
      cursor: pointer; padding: 4px 2px; -webkit-tap-highlight-color: transparent; }

    .btn-primary {
      background: var(--gray); color: white; border: none; border-radius: 12px;
      padding: 13px 24px; font-size: 17px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; min-height: 44px; width: 100%;
      transition: background 0.25s;
    }
    .btn-primary:not(:disabled)       { background: var(--blue); }
    .btn-primary.ready:not(:disabled) { background: var(--green); }
    .btn-primary:disabled             { opacity: 0.5; cursor: not-allowed; }
    .btn-primary:active:not(:disabled){ opacity: 0.75; }

    .btn-secondary { background: var(--gray); color: white; border: none; border-radius: 12px;
      padding: 13px 24px; font-size: 17px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; min-height: 44px; }

    .info-row { display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 0.5px solid var(--border); min-height: 44px; gap: 12px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { font-size: 16px; color: var(--label); }
    .info-val { font-size: 15px; color: var(--label3); text-align: right; }

    .state-box { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 48px 24px; text-align: center; }
    .state-icon  { font-size: 52px; opacity: 0.35; }
    .state-title { font-size: 20px; font-weight: 600; color: var(--label); }
    .state-desc  { font-size: 15px; color: var(--label3); max-width: 280px; line-height: 1.4; }

    .spinner { width: 24px; height: 24px; border: 2.5px solid var(--border);
      border-top-color: var(--blue); border-radius: 50%; animation: spin 0.75s linear infinite; }

    .tab-bar { background: var(--tabbar); backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 0.5px solid var(--border); display: flex;
      padding-bottom: var(--safe-b); flex-shrink: 0; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 3px; cursor: pointer; -webkit-tap-highlight-color: transparent;
      gap: 2px; border: none; background: none; }
    .tab-icon  { font-size: 24px; }
    .tab-label { font-size: 10px; font-weight: 500; }
    .tab-btn.active       { color: var(--blue); }
    .tab-btn:not(.active) { color: var(--gray); }

    .reload-btn { background: none; border: none; color: var(--blue); font-size: 20px;
      cursor: pointer; padding: 4px 8px; -webkit-tap-highlight-color: transparent; }

    .addr-picker { position: fixed; right: 12px; background: var(--surface);
      border-radius: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      z-index: 300; min-width: 210px; overflow: hidden;
      animation: fadeScale 0.18s cubic-bezier(0.34,1.56,0.64,1); transform-origin: top right; }
    .addr-picker-item { display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; gap: 10px; font-size: 15px; cursor: pointer;
      border-bottom: 0.5px solid var(--border); -webkit-tap-highlight-color: transparent; }
    .addr-picker-item:last-child { border-bottom: none; }
    .addr-picker-item.selected { font-weight: 600; color: var(--blue); }

    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; display: none; align-items: flex-end; }
    .backdrop.open { display: flex; animation: fadeIn 0.22s ease; }
    .sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%;
      max-height: 93dvh; display: flex; flex-direction: column;
      animation: slideUp 0.32s cubic-bezier(0.32, 0.72, 0, 1); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .sheet-header { display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px; flex-shrink: 0; }
    .sheet-title { font-size: 17px; font-weight: 600; }
    .sheet-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--safe-b) + 24px); }

    .status-msg { font-size: 14px; color: var(--label3); padding: 8px 0; text-align: center; }

    @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp   { from { transform: translateY(100%) } to { transform: translateY(0) } }
    @keyframes fadeScale { from { opacity: 0; transform: scale(0.92) } to { opacity: 1; transform: scale(1) } }
    @keyframes spin      { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
<div id="app">

  <!-- TERMINE TAB -->
  <div id="tab-termine" class="tab-view active">
    <div class="nav-bar">
      <div class="nav-bar-row">
        <div class="nav-title-large" id="termine-title">Abfuhrtermine</div>
        <div style="display:flex;gap:4px;align-items:center">
          <button class="reload-btn" onclick="reloadEntries()">&#x21bb;</button>
          <button class="btn-text" id="addr-picker-btn" onclick="toggleAddrPicker(event)" style="display:none;font-size:20px">&#x1F3E0;</button>
        </div>
      </div>
    </div>
    <div id="termine-body" class="content"></div>
  </div>

  <!-- ADRESSEN TAB -->
  <div id="tab-adressen" class="tab-view">
    <div class="nav-bar">
      <div class="nav-bar-row">
        <div class="nav-title-inline">Adressen</div>
        <button class="btn-text" onclick="openSheet()">&#xFF0B; Neu</button>
      </div>
    </div>
    <div id="adressen-body" class="content"></div>
  </div>

  <!-- EINSTELLUNGEN TAB -->
  <div id="tab-einstellungen" class="tab-view">

      </div>
    </div>
    <div id="einstellungen-body" class="content"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">

    </button>
    <button class="tab-btn" id="tabbtn-adressen" onclick="switchTab('adressen')">
      <span class="tab-icon">&#x1F4CD;</span><span class="tab-label">Adressen</span>
    </button>
    <button class="tab-btn" id="tabbtn-einstellungen" onclick="switchTab('einstellungen')">
      <span class="tab-icon">&#x2699;&#xFE0F;</span><span class="tab-label">Einstellungen</span>
    </button>
  </div>
</div>

<!-- ADDRESS PICKER -->
<div id="addr-picker" class="addr-picker" style="display:none"></div>

<!-- ADD ADDRESS SHEET -->
<div id="sheet-backdrop" class="backdrop" onclick="onBackdropClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="btn-text" onclick="closeSheet()">Abbrechen</button>
      <div class="sheet-title">Neue Adresse</div>

    <div class="sheet-body">

      <!-- Stufe 1: Stra&szlig;e -->

      <!-- Stufe 2: Hausnummer -->

          <div class="form-label">Hausnummer w&auml;hlen</div>
          <div class="form-card">
            <div class="form-row">
              <select id="f-hnr-select" onchange="onHnrSelect(this.value)">
                <option value="">Hausnummer ausw&auml;hlen...</option>

        <div class="form-section" style="margin-top:24px;display:flex;gap:10px">
          <button class="btn-secondary" onclick="prevStep()">Zur&uuml;ck</button>
          <button class="btn-primary" id="btn-next-hnr" onclick="nextStep()" disabled style="flex:1;width:auto">Weiter</button>
        </div>
      </div>

      <!-- Stufe 3: Speichern -->
      <div id="step-save" class="form-step">
        <div class="form-section">
          <div class="form-label">Adresse best&auml;tigen</div>
          <div class="form-card">
            <div class="form-row">
              <div id="addr-preview" style="font-size:16px;color:var(--label);padding:8px 0"></div>
            </div>

          <button class="btn-secondary" onclick="prevStep()">Zur&uuml;ck</button>
          <button class="btn-primary ready" id="btn-save" onclick="saveNewAddress()" style="flex:1;width:auto">Adresse speichern</button>
        </div>

    </div>
  </div>

<script>
'use strict';

// ── API Server ───────────────────────────────────────────────────────────────
// Our own backend handles the Wicket session with dresden.de and exposes
// clean JSON endpoints. No more CORS proxies or session juggling in the browser.
const API_BASE = 'https://dresdner-abfall-api.onrender.com';

// CORS proxy still needed for the iCal download (stadtplan.dresden.de)
const ICAL_PROXIES = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
];

async function icalFetch(url) {
  for (const make of ICAL_PROXIES) {
    try {
      const r = await fetch(make(url), { signal: AbortSignal.timeout(15000) });
      if (r.ok) return r;
    } catch { /* try next proxy */ }
  }
  throw new Error('iCal-Daten konnten nicht geladen werden');
}

async function apiFetch(path) {
  const r = await fetch(API_BASE + path, { signal: AbortSignal.timeout(15000) });
  if (!r.ok) throw new Error('API-Fehler: ' + r.status);
  return r.json();
}

// ── State ─────────────────────────────────────────────────────────────────────
let addresses       = [];
let activeAddressId = null;
let entries         = [];
let isLoading       = false;
let loadError       = null;
let pickerOpen      = false;
let lastLoadTime    = 0;

// Form state
let currentStep     = 'street';
let selectedStreet  = '';
let selectedHnr     = '';
let selectedStandortId = null;
let houseNumberData = []; // [{nr, standortId}] from API

// ── Persistence ───────────────────────────────────────────────────────────────
function persist() {
  localStorage.setItem('addresses', JSON.stringify(addresses));
  localStorage.setItem('activeAddressId', activeAddressId || '');
}

function hydrate() {
  try {
    addresses       = JSON.parse(localStorage.getItem('addresses') || '[]');
    activeAddressId = localStorage.getItem('activeAddressId') || null;
    if (activeAddressId && !addresses.find(a => a.id === activeAddressId))
      activeAddressId = addresses[0]?.id ?? null;
    if (!activeAddressId && addresses.length > 0)
      activeAddressId = addresses[0].id;
  } catch { addresses = []; activeAddressId = null; }
}

function migrateOldData() {
  const oldId = localStorage.getItem('standortId');
  if (oldId && !localStorage.getItem('addresses')) {
    const m = [{ id: Date.now().toString(), label: localStorage.getItem('addressName') || '',
      strasse: '', hausnummer: '', standortId: oldId, version: 1 }];
    localStorage.setItem('addresses', JSON.stringify(m));
    localStorage.setItem('activeAddressId', m[0].id);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function displayName(addr) {
  if (addr.label) return addr.label;
  if (addr.strasse) return (addr.strasse + ' ' + addr.hausnummer).trim();
  return 'ID ' + addr.standortId;
}

function sortedAddresses() {
  return [...addresses].sort((a, b) => displayName(a).localeCompare(displayName(b), 'de'));
}

// ── Dresden API (via our backend) ────────────────────────────────────────────

let streetDebounce = null;

async function fetchStreets(query) {
  const data = await apiFetch('/streets?q=' + encodeURIComponent(query));
  return Array.isArray(data) ? data : [];
}

async function fetchHouseNumbers(street) {
  const data = await apiFetch('/housenumbers?street=' + encodeURIComponent(street));
  return Array.isArray(data) ? data : [];
}

// ── iCal Parser ───────────────────────────────────────────────────────────────
function parseICal(text) {
  const events = [];
  const lines  = text.replace(/\r\n|\r/g, '\n').split('\n');
  let inEvent = false, cur = {};
  for (const raw of lines) {
    const line = raw.trim();
    if (line === 'BEGIN:VEVENT') { inEvent = true; cur = {}; continue; }
    if (line === 'END:VEVENT')   { if (inEvent) events.push({...cur}); inEvent = false; continue; }
    if (!inEvent) continue;
    if (line.startsWith('SUMMARY:')) cur.summary = line.slice(8);
    else if (line.startsWith('DTSTART')) {
      const val = line.includes(':') ? line.split(':').slice(1).join(':') : line;
      const m   = val.match(/(\d{4})(\d{2})(\d{2})/);
      if (m) cur.date = new Date(+m[1], +m[2]-1, +m[3]);
    }
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const result = [];
  for (const ev of events) {
    if (!ev.date || ev.date < today) continue;
    const types = ev.summary ? ev.summary.split(',').map(s => s.trim()) : [''];
    for (const t of types) result.push({ date: ev.date, type: t });
  }
  result.sort((a,b) => a.date - b.date);
  return result;
}

// ── Waste Metadata ────────────────────────────────────────────────────────────
function wasteInfo(rawType) {
  const t = rawType.replace(/^Leerung\s+/, '').trim();
  if (t === 'Restabfall')                         return { name:'Restabfall',  emoji:'\u{1F5D1}\uFE0F', color:'#8E8E93', bg:'rgba(142,142,147,0.14)' };
  if (t === 'Bio-Tonne' || t === 'Biotonne')      return { name:'Bio-Tonne',   emoji:'\u{1F331}', color:'#34C759', bg:'rgba(52,199,89,0.14)'   };
  if (t === 'Gelbe Tonne' || t === 'Gelbe S\u00e4cke') return { name:'Gelbe Tonne', emoji:'\u267B\uFE0F', color:'#C49A00', bg:'rgba(255,214,10,0.18)'  };
  if (t === 'Blaue Tonne' || t === 'Papiertonne') return { name:'Blaue Tonne', emoji:'\u{1F4C4}', color:'#007AFF', bg:'rgba(0,122,255,0.12)'   };
  return { name: t || 'Unbekannt', emoji:'\u{1F6AE}', color:'#8E8E93', bg:'rgba(142,142,147,0.10)' };
}

// ── Date Helpers ──────────────────────────────────────────────────────────────
function daysUntil(date) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((date - today) / 86400000);
}
const fmtDate  = new Intl.DateTimeFormat('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
const fmtMonth = new Intl.DateTimeFormat('de-DE', { month:'long', year:'numeric' });

// ── iCal Loading ──────────────────────────────────────────────────────────────
async function loadEntries(addr) {
  if (!addr) return;
  isLoading = true; loadError = null;
  renderTermine();
  const today = new Date();
  const pad   = n => String(n).padStart(2,'0');
  const von   = pad(today.getDate()) + '.' + pad(today.getMonth()+1) + '.' + today.getFullYear();
  const bis   = '31.12.' + today.getFullYear();
  const url   = 'https://stadtplan.dresden.de/project/cardo3Apps/IDU_DDStadtplan/abfall/ical.ashx' +
                '?STANDORT=' + addr.standortId + '&DATUM_VON=' + von + '&DATUM_BIS=' + bis;
  try {
    const r  = await icalFetch(url);
    entries  = parseICal(await r.text());
    loadError = null;
  } catch (err) {
    loadError = err.message; entries = [];
  }
  isLoading = false; lastLoadTime = Date.now();
  renderTermine();
}

// ── Renderers ─────────────────────────────────────────────────────────────────
function renderTermine() {
  const body = document.getElementById('termine-body');
  if (!body) return;
  const addr = addresses.find(a => a.id === activeAddressId);
  document.getElementById('termine-title').textContent = addr ? displayName(addr) : 'Abfuhrtermine';
  const pb = document.getElementById('addr-picker-btn');
  if (pb) pb.style.display = addresses.length > 1 ? '' : 'none';

  if (!addr) {
    body.innerHTML = '<div class="state-box"><div class="state-icon">\u{1F4CD}</div>' +
      '<div class="state-title">Keine Adresse</div>' +
      '<div class="state-desc">F\u00fcge unter \u00BBAdressen\u00AB deine erste Adresse hinzu.</div></div>';
    return;
  }
  if (isLoading) { body.innerHTML = '<div class="state-box"><div class="spinner"></div></div>'; return; }
  if (loadError) {
    body.innerHTML = '<div class="state-box"><div class="state-icon">\u26A0\uFE0F</div>' +
      '<div class="state-title">Fehler beim Laden</div>' +
      '<div class="state-desc">' + loadError + '</div></div>';
    return;
  }
  if (entries.length === 0) {
    body.innerHTML = '<div class="state-box"><div class="state-icon">\u2705</div>' +
      '<div class="state-title">Keine Termine</div>' +
      '<div class="state-desc">Keine anstehenden Abfuhrtermine gefunden.</div></div>';
    return;
  }
  const groups = new Map();
  for (const e of entries) {
    const key = fmtMonth.format(e.date);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  }
  let html = '';
  for (const [month, evts] of groups) {
    html += '<div class="section"><div class="section-label">' + month + '</div><div class="card">';
    for (const e of evts) {
      const info = wasteInfo(e.type);
      const d    = daysUntil(e.date);
      const urgentClass = d <= 1 ? ' urgent' : '';
      const urgentLabel = d === 0 ? ' \u2014 Heute!' : d === 1 ? ' \u2014 Morgen!' : d <= 3 ? ' \u2014 in ' + d + ' Tagen' : '';
      html += '<div class="entry-row">' +
        '<div class="waste-icon" style="background:' + info.bg + '">' + info.emoji + '</div>' +
        '<div class="entry-info">' +
          '<div class="entry-name" style="color:' + info.color + '">' + info.name + '</div>' +
          '<div class="entry-date' + urgentClass + '">' + fmtDate.format(e.date) + urgentLabel + '</div>' +
        '</div></div>';
    }
    html += '</div></div>';
  }
  body.innerHTML = html + '<div style="height:20px"></div>';
}

function renderAdressen() {
  const body = document.getElementById('adressen-body');
  if (!body) return;
  const sorted = sortedAddresses();
  if (sorted.length === 0) {
    body.innerHTML = '<div class="state-box"><div class="state-icon">\u{1F3E0}</div>' +
      '<div class="state-title">Noch keine Adressen</div>' +
      '<div class="state-desc">Tippe auf \u00BB+ Neu\u00AB, um deine erste Adresse hinzuzuf\u00fcgen.</div></div>';
    return;
  }
  let html = '<div class="section"><div class="card">';
  for (const addr of sorted) {
    const sub = addr.strasse ? (addr.strasse + ' ' + addr.hausnummer) : ('ID ' + addr.standortId);
    html += '<div class="addr-row" onclick="selectAddress(\'' + addr.id + '\')">' +
      '<div class="addr-info">' +
        '<div class="addr-name">' + displayName(addr) + '</div>' +
        '<div class="addr-sub">' + sub + '</div>' +
      '</div>' +
      (addr.id === activeAddressId ? '<span class="addr-check">\u2713</span>' : '') +
      '<button class="addr-delete" onclick="event.stopPropagation();deleteAddress(\'' + addr.id + '\')">&times;</button>' +
    '</div>';
  }
  body.innerHTML = html + '</div></div><div style="height:20px"></div>';
}

function renderEinstellungen() {
  const body = document.getElementById('einstellungen-body');
  if (!body) return;
  const addr = addresses.find(a => a.id === activeAddressId);
  body.innerHTML =
    '<div class="section"><div class="section-label">Aktive Adresse</div><div class="card">' +
      '<div class="info-row"><span class="info-key">Name</span>' +
        '<span class="info-val">' + (addr ? displayName(addr) : '\u2014') + '</span></div>' +
      '<div class="info-row"><span class="info-key">STANDORT-ID</span>' +
        '<span class="info-val">' + (addr ? addr.standortId : '\u2014') + '</span></div>' +
    '</div></div>' +
    '<div class="section"><div class="section-label">App</div><div class="card">' +
      '<div class="info-row"><span class="info-key">Version</span><span class="info-val">2.0</span></div>' +
      '<div class="info-row"><span class="info-key">Datenquelle</span><span class="info-val">stadtplan.dresden.de</span></div>' +
    '</div></div>' +
    '<a href="impressum.html" style="display:block;text-align:center;margin-top:32px;color:#999;font-size:13px;text-decoration:none">' +
      'Impressum & Datenschutz</a>' +
    '<div style="height:20px"></div>';
}

// ── Address Management ────────────────────────────────────────────────────────
function selectAddress(id) {
  activeAddressId = id; persist();
  closeAddrPicker(); renderAdressen(); renderEinstellungen();
  loadEntries(addresses.find(a => a.id === id));
  switchTab('termine');
}

function deleteAddress(id) {
  if (!confirm('Adresse l\u00f6schen?')) return;
  addresses = addresses.filter(a => a.id !== id);
  if (activeAddressId === id) { activeAddressId = addresses[0]?.id ?? null; entries = []; loadError = null; }
  persist(); renderAdressen(); renderTermine(); renderEinstellungen();
}

// ── Tab Switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
  document.getElementById('tabbtn-' + name)?.classList.add('active');
  if (name === 'adressen')      renderAdressen();
  if (name === 'einstellungen') renderEinstellungen();
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function openSheet() {
  currentStep = 'street'; selectedStreet = ''; selectedHnr = ''; selectedStandortId = null;
  houseNumberData = [];
  document.getElementById('sheet-backdrop')?.classList.add('open');
  updateSteps();

  // Reset inputs
  ['f-street-input','f-label'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  const hs = document.getElementById('f-hnr-select');
  if (hs) hs.innerHTML = '<option value="">Hausnummer ausw\u00e4hlen...</option>';
  document.getElementById('street-dropdown').style.display = 'none';
  setBtnReady('btn-next-street', false);
  setBtnReady('btn-next-hnr', false);
  setStatus('');
  document.getElementById('f-street-input')?.focus();
}

function closeSheet() {
  document.getElementById('sheet-backdrop')?.classList.remove('open');
}

function onBackdropClick(e) {
  if (e.target === e.currentTarget) closeSheet();
}

function setStatus(msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setBtnReady(id, ready) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = !ready;
  if (ready) btn.classList.add('ready');
  else       btn.classList.remove('ready');
}

function updateSteps() {
  document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + currentStep)?.classList.add('active');
}

function nextStep() {
  if (currentStep === 'street' && selectedStreet) {
    currentStep = 'hnr'; updateSteps(); loadHouseNumbers();
  } else if (currentStep === 'hnr' && selectedHnr) {
    currentStep = 'save';
    document.getElementById('addr-preview').textContent = selectedStreet + ' ' + selectedHnr;
    updateSteps();
  }
}

function prevStep() {
  if      (currentStep === 'hnr')  currentStep = 'street';
  else if (currentStep === 'save') currentStep = 'hnr';
  updateSteps();
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  const dd  = document.getElementById('street-dropdown');
  const inp = document.getElementById('f-street-input');
  if (!dd || !inp) return;
  if (!dd.contains(e.target) && !inp.contains(e.target)) dd.style.display = 'none';
});

function onStreetInput(value) {
  const dd = document.getElementById('street-dropdown');
  selectedStreet = '';
  setBtnReady('btn-next-street', false);
  if (value.length < 2) { dd.style.display = 'none'; return; }

  // Debounce 300ms
  clearTimeout(streetDebounce);
  streetDebounce = setTimeout(async () => {
    try {
      const streets = await fetchStreets(value);
      if (streets.length > 0) {
        dd.innerHTML = streets.slice(0, 8).map(s =>
          '<div class="dropdown-item" onclick="selectStreet(\'' + s.replace(/'/g, "\\'") + '\')">' + s + '</div>'
        ).join('');
        dd.style.display = 'block';
      } else {
        dd.style.display = 'none';
      }
    } catch { dd.style.display = 'none'; }
  }, 300);
}

function selectStreet(street) {
  selectedStreet = street;
  document.getElementById('f-street-input').value = street;
  document.getElementById('street-dropdown').style.display = 'none';
  setBtnReady('btn-next-street', true);
}

async function loadHouseNumbers() {
  const select = document.getElementById('f-hnr-select');
  setBtnReady('btn-next-hnr', false);
  selectedHnr = '';
  selectedStandortId = null;
  select.innerHTML = '<option value="">Lade Hausnummern...</option>';
  try {
    houseNumberData = await fetchHouseNumbers(selectedStreet);
    if (houseNumberData.length > 0) {
      select.innerHTML = '<option value="">Hausnummer ausw\u00e4hlen...</option>' +
        houseNumberData.map(h =>
          '<option value="' + h.standortId + '">' + h.nr + '</option>'
        ).join('');
    } else {
      select.innerHTML = '<option value="">Keine Hausnummern gefunden</option>';
    }
  } catch {
    select.innerHTML = '<option value="">Fehler beim Laden</option>';
  }
}

function onHnrSelect(value) {
  if (!value) { selectedHnr = ''; selectedStandortId = null; setBtnReady('btn-next-hnr', false); return; }
  // value is the standortId from the API
  selectedStandortId = value;
  const found = houseNumberData.find(h => String(h.standortId) === String(value));
  selectedHnr = found ? found.nr : value;
  setBtnReady('btn-next-hnr', true);
}

async function saveNewAddress() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  let standortId = selectedStandortId;

  // If we don't have a standortId yet (shouldn't happen with the new API), try to get it
  if (!standortId) {
    setStatus('Ermittle Standort-ID...');
    try {
      const data = await apiFetch('/standortid?street=' + encodeURIComponent(selectedStreet) + '&nr=' + encodeURIComponent(selectedHnr));
      standortId = data.standortId ? String(data.standortId) : null;
    } catch { /* ignore */ }
  }

  if (!standortId) {
    setStatus('\u26A0\uFE0F Standort-ID konnte nicht ermittelt werden.');
    btn.disabled = false;
    return;
  }

  const label = document.getElementById('f-label')?.value.trim() || '';
  const addr  = { id: uid(), label, strasse: selectedStreet, hausnummer: selectedHnr, standortId: String(standortId), version: 2 };
  addresses.push(addr);
  if (!activeAddressId) activeAddressId = addr.id;
  persist(); closeSheet(); renderAdressen();
  if (activeAddressId === addr.id) loadEntries(addr); else renderTermine();
}

// ── Reload ────────────────────────────────────────────────────────────────────
function reloadEntries() {
  loadEntries(addresses.find(a => a.id === activeAddressId));
}

// ── Address Picker ────────────────────────────────────────────────────────────
function toggleAddrPicker(e) { pickerOpen ? closeAddrPicker() : openAddrPicker(e); }

function openAddrPicker(e) {
  const picker = document.getElementById('addr-picker');
  if (!picker) return;
  const rect = e?.currentTarget?.getBoundingClientRect() ?? { bottom: 60 };
  picker.style.top     = (rect.bottom + 4) + 'px';
  picker.style.display = '';
  picker.innerHTML = sortedAddresses().map(a =>
    '<div class="addr-picker-item ' + (a.id === activeAddressId ? 'selected' : '') + '" onclick="selectAddress(\'' + a.id + '\')">' +
      displayName(a) + (a.id === activeAddressId ? ' <span>\u2713</span>' : '') +
    '</div>').join('');
  pickerOpen = true;
  requestAnimationFrame(() => document.addEventListener('click', closeAddrPicker, { once: true }));
}

function closeAddrPicker() {
  document.getElementById('addr-picker').style.display = 'none';
  pickerOpen = false;
}

// ── Auto-refresh on app resume ────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && Date.now() - lastLoadTime > 30 * 60 * 1000)
    reloadEntries();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
migrateOldData();
hydrate();
renderTermine();
const _sel = addresses.find(a => a.id === activeAddressId);
if (_sel) loadEntries(_sel);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () =>
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e))
  );
}
</script>
</body>
</html>
